name: Publish crate

on:
  push:
    branches:
      - main
    paths:
      - Cargo.toml
      - Cargo.lock
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always
  CRATE_NAME: worktree-gc

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read package versions
        id: version
        run: |
          version="$(cargo metadata --no-deps --format-version 1 | python -c 'import json, sys; print(next(package for package in json.load(sys.stdin)["packages"] if package["name"] == "worktree-gc")["version"])')"
          previous_version=""

          if [[ "${{ github.event_name }}" == "push" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            if git cat-file -e "${{ github.event.before }}:Cargo.toml" 2>/dev/null; then
              previous_version="$(git show "${{ github.event.before }}:Cargo.toml" | python -c 'import sys, tomllib; print(tomllib.load(sys.stdin.buffer)["package"]["version"])')"
            fi
          fi

          changed=true
          if [[ "${{ github.event_name }}" == "push" && "$version" == "$previous_version" ]]; then
            changed=false
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "previous_version=$previous_version" >> "$GITHUB_OUTPUT"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check whether version is already published
        id: published
        if: steps.version.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          url="https://crates.io/api/v1/crates/${CRATE_NAME}/${VERSION}"
          status="$(curl -sS -o /tmp/crate-version.json -w '%{http_code}' -H 'User-Agent: wycats/worktree-gc publish workflow' "$url")"
          case "$status" in
            200)
              echo "exists=true" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "exists=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              cat /tmp/crate-version.json >&2
              echo "unexpected crates.io response: HTTP $status" >&2
              exit 1
              ;;
          esac

      - name: Skip unchanged package version
        if: steps.version.outputs.changed == 'false'
        run: |
          echo "Cargo.toml package.version is still ${{ steps.version.outputs.version }}; nothing to publish."

      - name: Skip already-published version
        if: steps.version.outputs.changed == 'true' && steps.published.outputs.exists == 'true'
        run: |
          echo "${CRATE_NAME} ${{ steps.version.outputs.version }} is already published on crates.io; nothing to publish."

      - name: Verify package
        if: steps.version.outputs.changed == 'true' && steps.published.outputs.exists == 'false'
        run: cargo publish --locked --dry-run

      - name: Authenticate with crates.io
        if: steps.version.outputs.changed == 'true' && steps.published.outputs.exists == 'false'
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish crate
        if: steps.version.outputs.changed == 'true' && steps.published.outputs.exists == 'false'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

      - name: Create release tag
        if: steps.version.outputs.changed == 'true' && steps.published.outputs.exists == 'false'
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; skipping tag creation."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
