name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, such as v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: worktree-gc

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            archive_ext: tgz
            binary_ext: ""
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive_ext: tgz
            binary_ext: ""
          - target: aarch64-apple-darwin
            os: macos-14
            archive_ext: tgz
            binary_ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            archive_ext: zip
            binary_ext: ".exe"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify tag matches Cargo version
        id: version
        shell: bash
        run: |
          cargo_version="$(cargo metadata --locked --no-deps --format-version 1 | python -c 'import json, sys; print(next(package for package in json.load(sys.stdin)["packages"] if package["name"] == "worktree-gc")["version"])')"
          release_ref="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          tag_version="${release_ref#v}"
          if [[ "$cargo_version" != "$tag_version" ]]; then
            echo "Cargo.toml version $cargo_version does not match tag $release_ref" >&2
            exit 1
          fi
          echo "cargo_version=$cargo_version" >> "$GITHUB_OUTPUT"

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package release archive
        id: package
        shell: bash
        run: |
          package="${BIN_NAME}-${{ matrix.target }}-v${{ steps.version.outputs.cargo_version }}"
          staging="dist/${package}"
          mkdir -p "$staging"
          cp "target/${{ matrix.target }}/release/${BIN_NAME}${{ matrix.binary_ext }}" "$staging/"
          if [[ "${{ matrix.archive_ext }}" == "zip" ]]; then
            PACKAGE="$package" BINARY="${BIN_NAME}${{ matrix.binary_ext }}" python - <<'PY'
          import os
          import zipfile

          package = os.environ["PACKAGE"]
          binary = os.environ["BINARY"]
          archive = f"{package}.zip"
          source = os.path.join("dist", package, binary)
          destination = f"{package}/{binary}"

          with zipfile.ZipFile(archive, "w", zipfile.ZIP_DEFLATED) as zip_file:
              zip_file.write(source, destination)
          PY
          else
            tar -C dist -czf "${package}.tgz" "$package"
          fi
          echo "archive=${package}.${{ matrix.archive_ext }}" >> "$GITHUB_OUTPUT"

      - name: Upload archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: ${{ steps.package.outputs.archive }}
          if-no-files-found: error

  release:
    name: publish GitHub release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download release archives
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
